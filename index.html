<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sunday Baam | now we are standing</title>
    <meta
      name="description"
      content="선데이밤 공연을 소개하는 현장용 웹페이지. 밴드의 정체성과 멤버, 파트별 셋리스트를 한 화면에서 보여줍니다."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;500;700;900&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero hero--immersive">
      <div class="hero__inner">
        <p class="eyebrow reveal">Sunday Baam Live Concert</p>
        <h1 class="hero__title reveal">
          <span class="hero__title-script">Sunday Baam</span>
          <span class="hero__title-block">Now we are standing</span>
        </h1>
      </div>
    </header>

    <div class="page-shell">
      <main>
        <section class="section members">
          <div class="section-heading reveal">
            <p class="section-heading__eyebrow">Members</p>
            <h2>Line-up</h2>
          </div>
          <div id="members" class="members__grid"></div>
        </section>

        <section class="section setlist">
          <div class="section-heading reveal">
            <p class="section-heading__eyebrow">Setlist</p>
          </div>
          <div class="setlist__controls reveal">
            <button id="setlist-toggle" class="setlist-toggle" type="button" aria-expanded="false">
              <span>멤버 보기</span>
            </button>
          </div>
          <div id="setlist" class="setlist__grid"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
